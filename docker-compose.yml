version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ecurrency_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecurrency_db
      POSTGRES_USER: ecurrency_user
      POSTGRES_PASSWORD: ecurrency_password
    ports:
      - "5432:5432"
    volumes:
      - ecurrency_postgres_data:/var/lib/postgresql/data

volumes:
  ecurrency_postgres_data: